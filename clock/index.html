
<!doctype html>
<html>
<head>
<style>
    @font-face {
    font-family: 'AdLib';
    src: url('https://file.garden/aUYIWVAKvQxCBY-_/fonts/roboto-2011/Roboto-Light.ttf') format('truetype')
}
* {
  margin: 0;
  padding: 0;
}

html {
  font-size: 10px;
}

body {
  font-family: "AdLib", sans-serif;
  background-color: black;
}

.layout {
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  position: absolute;
}


@keyframes change-color {
  0% {
    background-position: 0% 0%;
  }

  50% {
    background-position: 100% 100%;
  }

  100% {
    background-position: 0% 0%;
  }
}

.time__layout {
  width: 100vw;
  height: 100vh;
  position: absolute;
  top: 0;
  left: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background-color: black;
}

.time__show {
  font-size: 12rem;
  color: #fff;
}

.time__day {
  position: absolute;
  top: 85%;
  left: 42%;
  font-size: 1.6rem;
  color: white;
  display: none;
}
</style>
</head><body><div class="layout">
  <div class="time__show">PLEASE WAIT, TIME/CLOCK IS LOADING...</div>
</div>
<script>
    //Tiempo
let clockTime = document.querySelector(".time__show");

setInterval(() => {
    
    let myDate = new Date();
    let hours = myDate.getHours();
    let min = myDate.getMinutes();
    let day = myDate.getDay();
    //Agregar el cero delante del número

    if(hours < 10) hours = "0" + hours;
    if(min < 10) min = "0" + min;

    clockTime.textContent = `${hours}:${min}`;

}, 1000);
</script></body></html>
